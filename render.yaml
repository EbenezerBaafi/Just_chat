databases:
  - name: just-chat-db
    databaseName: justchat
    user: justchat

services:
  - type: redis
    name: just-chat-redis
    ipAllowList: [] # Only allow internal connections

  - type: web
    name: just-chat-backend
    env: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "daphne -b 0.0.0.0 -p $PORT config.asgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: just-chat-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: just-chat-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
